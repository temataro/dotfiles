# ============================================================================
# kitty — slim, rose-pine (on true black). Replaces kitty's full default dump.
# Deploys to ~/.config/kitty/kitty.conf. Only non-default settings are listed;
# everything else uses kitty's built-in defaults.
# ============================================================================

# ----- Font -----
font_family       ShureTechMonoNerdFont
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         22
disable_ligatures never
box_drawing_scale 0.001, 1, 1.5, 2

# ----- Cursor -----
cursor_shape               block
cursor_blink_interval      0.65
cursor_stop_blinking_after 15.0

# ----- Scrollback -----
scrollback_lines        10000
scrollback_pager        less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
wheel_scroll_multiplier 5.0

# ----- Mouse -----
copy_on_select        yes
focus_follows_mouse   yes
default_pointer_shape beam
url_style             curly
detect_urls           yes

# ----- Bell -----
enable_audio_bell    no
window_alert_on_bell yes

# ----- Window / layout -----
remember_window_size    yes
initial_window_width    640
initial_window_height   400
window_padding_width    8
window_border_width     1.5pt
draw_minimal_borders    yes
placement_strategy      center
hide_window_decorations no
confirm_os_window_close 0
enabled_layouts         *

# ----- Tab bar -----
tab_bar_edge            bottom
tab_bar_style           fade
tab_bar_align           left
tab_bar_min_tabs        2
tab_title_template      "{index}:{layout_name}"
active_tab_font_style   bold-italic
inactive_tab_font_style normal

# ----- Opacity (dynamic so the floating kitty's --override + picom blur work) -----
background_opacity         1.0
dynamic_background_opacity yes

# ----- Shell integration -----
shell_integration enabled
term              xterm-kitty

# ============================================================================
# rose-pine on true black — matches i3 / tmux / nvim / starship
# ============================================================================
foreground            #e0def4
background            #000000
selection_foreground  #e0def4
selection_background  #403d52
cursor                #e0def4
cursor_text_color     #000000
url_color             #c4a7e7

active_border_color   #31748f
inactive_border_color #21202e
bell_border_color     #f6c177

active_tab_foreground   #e0def4
active_tab_background   #26233a
inactive_tab_foreground #6e6a86
inactive_tab_background #000000

# normal
color0 #26233a
color1 #eb6f92
color2 #31748f
color3 #f6c177
color4 #9ccfd8
color5 #c4a7e7
color6 #ebbcba
color7 #e0def4
# bright
color8  #6e6a86
color9  #eb6f92
color10 #31748f
color11 #f6c177
color12 #9ccfd8
color13 #c4a7e7
color14 #ebbcba
color15 #e0def4
