##############################################################################
# picom.conf — compositor for i3 (picom v12+)
# Deploys to ~/.config/picom/picom.conf
# Visual levers: rounded corners, shadows, blur-behind-transparency, fades,
# inactive-window dimming. If picom fails to start, switch backend to "xrender"
# and remove the blur block (dual_kawase needs glx).
##############################################################################

#-- Backend ------------------------------------------------------------------
backend = "glx";
vsync = true;
use-damage = true;
detect-rounded-corners = true;
detect-client-opacity = true;

#-- Rounded corners ----------------------------------------------------------
corner-radius = 10;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'i3bar'"
];

#-- Shadows ------------------------------------------------------------------
shadow = true;
shadow-radius = 14;
shadow-opacity = 0.45;
shadow-offset-x = -14;
shadow-offset-y = -14;
shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'i3bar'",
  "_GTK_FRAME_EXTENTS@"
];

#-- Fading -------------------------------------------------------------------
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;

#-- Blur (behind translucent windows) ---------------------------------------
blur: {
  method = "dual_kawase";
  strength = 5;
};
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'i3bar'"
];

#-- Transparency / opacity ---------------------------------------------------
inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
focus-exclude = [
  "class_g = 'rofi'",
  "class_g = 'flameshot'",
  "fullscreen"
];

# Keep media/browsers fully opaque regardless of focus.
opacity-rule = [
  "100:class_g = 'firefox'",
  "100:class_g = 'chromium'",
  "100:fullscreen"
];

#-- Window-type tweaks (correctly nested under wintypes; the old config had
#-- these at top level, where picom silently ignored them) -------------------
wintypes:
{
  tooltip       = { fade = true; shadow = false; opacity = 0.9; focus = true; };
  menu          = { shadow = false; };
  dropdown_menu = { shadow = false; };
  popup_menu    = { shadow = false; };
  utility       = { shadow = false; };
  dock          = { shadow = false; };
  dnd           = { shadow = false; };
  notification  = { shadow = true; };
};
