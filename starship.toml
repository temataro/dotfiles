# starship prompt — rose-pine, matching the i3 / tmux / nvim theme.
# Deploys to ~/.config/starship.toml.
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$python\
$c\
$lua\
$cmd_duration\
$line_break\
$character"""

add_newline = true
palette = "rose_pine"

[palettes.rose_pine]
base = "#191724"
surface = "#1f1d2e"
overlay = "#26233a"
muted = "#6e6a86"
subtle = "#908caa"
text = "#e0def4"
love = "#eb6f92"
gold = "#f6c177"
rose = "#ebbcba"
pine = "#31748f"
foam = "#9ccfd8"
iris = "#c4a7e7"

[directory]
style = "bold foam"
truncation_length = 3
truncate_to_repo = true
read_only = " "
read_only_style = "love"

[git_branch]
symbol = " "
style = "iris"
format = "[$symbol$branch]($style) "

[git_status]
style = "love"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[python]
symbol = " "
style = "gold"
format = '[$symbol$version( \($virtualenv\))]($style) '

[c]
symbol = " "
style = "subtle"
format = '[$symbol($version)]($style) '

[lua]
symbol = " "
style = "subtle"
format = '[$symbol($version)]($style) '

[cmd_duration]
min_time = 500
style = "muted"
format = "[ $duration]($style) "

[character]
success_symbol = "[❯](bold pine)"
error_symbol = "[❯](bold love)"
vimcmd_symbol = "[❮](bold gold)"
